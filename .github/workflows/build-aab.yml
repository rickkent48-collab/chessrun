name: Build AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        # The sdkmanager --licenses command exits non-zero when no new licenses exist;
        # || true is intentional to handle that expected case on fresh runners.
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required Android SDK components
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Check for signing secrets
        id: check_secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "Signing secrets found – release AAB will be signed."
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "::warning::Signing secrets not configured. Building unsigned release AAB."
            echo "::warning::To sign the bundle, add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,"
            echo "::warning::ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD as repository secrets."
            echo "::warning::Run the 'Generate Upload Keystore' workflow to create a keystore."
          fi

      - name: Decode keystore
        if: steps.check_secrets.outputs.has_secrets == 'true'
        shell: bash
        run: |
          mkdir -p android
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > android/keystore.jks
          ls -lh android/keystore.jks

      - name: Verify keystore
        if: steps.check_secrets.outputs.has_secrets == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Step 1: verify store password and that the alias exists
          keytool -list \
            -keystore android/keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            -noprompt 2>&1 || {
            echo "::error::Keystore store-password or alias verification failed."
            echo "::error::Check that ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_ALIAS are correct."
            echo "::error::Re-run the 'Generate Upload Keystore' workflow and reset all 4 secrets."
            exit 1
          }
          # Step 2: verify key password by doing a real test-sign with jarsigner.
          # keytool -certreq ignores -keypass for PKCS12 keystores, so it cannot
          # catch a wrong ANDROID_KEY_PASSWORD. jarsigner correctly tests all formats.
          mkdir -p /tmp/kv-test
          echo "Manifest-Version: 1.0" > /tmp/kv-test/MANIFEST.MF
          jar cf /tmp/kv-verify.jar -C /tmp/kv-test MANIFEST.MF
          jarsigner \
            -keystore android/keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            /tmp/kv-verify.jar \
            "$ANDROID_KEY_ALIAS" 2>&1 || {
            echo "::error::Key password verification failed: ANDROID_KEY_PASSWORD does not match the key in the keystore."
            echo "::error::For PKCS12 keystores (modern Java default), ANDROID_KEY_PASSWORD must equal ANDROID_KEYSTORE_PASSWORD."
            echo "::error::For JKS keystores, verify both ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_PASSWORD are correct."
            echo "::error::Re-run the 'Generate Upload Keystore' workflow and reset all 4 secrets."
            exit 1
          }
          rm -rf /tmp/kv-test /tmp/kv-verify.jar
          echo "Keystore verification passed: store password, alias, and key password are all correct."

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Locate produced AAB
        id: find_aab
        run: |
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" | head -1)
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          if [ -n "$AAB" ]; then
            echo "AAB produced at: $AAB"
            ls -lh "$AAB"
          else
            echo "::error::No .aab file found after build."
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: chess-run-release-aab
          path: ${{ steps.find_aab.outputs.aab_path }}
          if-no-files-found: error
