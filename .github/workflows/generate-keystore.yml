name: Generate Upload Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate random passwords
        id: passwords
        run: |
          STORE_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          KEY_PASS=$(openssl rand -base64 32 | tr -d '/+=' | head -c 32)
          echo "store_pass=$STORE_PASS" >> $GITHUB_OUTPUT
          echo "key_pass=$KEY_PASS" >> $GITHUB_OUTPUT
          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"

      - name: Generate JKS upload keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore upload-keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -alias upload \
            -dname "CN=Chess Run, OU=Mobile, O=AppsbyRick, L=Unknown, ST=Unknown, C=US" \
            -storepass "${{ steps.passwords.outputs.store_pass }}" \
            -keypass "${{ steps.passwords.outputs.key_pass }}"

      - name: Encode keystore to Base64
        run: base64 -w 0 upload-keystore.jks > upload-keystore.base64.txt

      - name: Write credentials file
        run: |
          cat > upload-keystore-credentials.txt << CREDS
          ANDROID_KEY_ALIAS=upload
          ANDROID_KEYSTORE_PASSWORD=${{ steps.passwords.outputs.store_pass }}
          ANDROID_KEY_PASSWORD=${{ steps.passwords.outputs.key_pass }}
          CREDS

      - name: Print setup instructions
        run: |
          echo "========================================================"
          echo "  KEYSTORE GENERATED SUCCESSFULLY"
          echo "========================================================"
          echo ""
          echo "  Download the artifacts below, then add these 4 secrets"
          echo "  to your repository:"
          echo "    GitHub UI: Settings > Secrets and variables > Actions"
          echo "               > New repository secret"
          echo ""
          echo "  Secret 1:  ANDROID_KEYSTORE_BASE64"
          echo "             Value: entire contents of upload-keystore.base64.txt"
          echo ""
          echo "  Secret 2:  ANDROID_KEYSTORE_PASSWORD"
          echo "             Value: see upload-keystore-credentials.txt"
          echo ""
          echo "  Secret 3:  ANDROID_KEY_ALIAS"
          echo "             Value: upload"
          echo ""
          echo "  Secret 4:  ANDROID_KEY_PASSWORD"
          echo "             Value: see upload-keystore-credentials.txt"
          echo ""
          echo "  IMPORTANT:"
          echo "  - Store upload-keystore.jks securely (e.g., password manager)."
          echo "  - You will need the original keystore to publish app updates."
          echo "  - Google Play uses Play App Signing; this is your UPLOAD key."
          echo "  - Never commit the .jks file to source control."
          echo "========================================================"

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: |
            upload-keystore.jks
            upload-keystore.base64.txt
            upload-keystore-credentials.txt
