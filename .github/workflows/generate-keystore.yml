name: Generate Upload Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate random credentials
        id: creds
        run: |
          # Generate random passwords (32 hex chars each)
          KEYSTORE_PASSWORD=$(openssl rand -hex 16)
          KEY_PASSWORD=$(openssl rand -hex 16)
          KEY_ALIAS="chessrun-upload-key"

          echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD"           >> "$GITHUB_OUTPUT"
          echo "key_alias=$KEY_ALIAS"                 >> "$GITHUB_OUTPUT"

          echo "Generated credentials:"
          echo "  Alias: $KEY_ALIAS"
          echo "  Keystore password: $KEYSTORE_PASSWORD"
          echo "  Key password: $KEY_PASSWORD"

      - name: Generate keystore with keytool
        run: |
          keytool -genkeypair \
            -alias "${{ steps.creds.outputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore chessrun-upload-key.jks \
            -storepass "${{ steps.creds.outputs.keystore_password }}" \
            -keypass "${{ steps.creds.outputs.key_password }}" \
            -dname "CN=ChessRun, OU=Mobile, O=ChessRun, L=Unknown, ST=Unknown, C=US" \
            -storetype JKS

          echo "Keystore generated: chessrun-upload-key.jks"
          ls -la chessrun-upload-key.jks

      - name: Encode keystore to base64
        run: |
          base64 -w 0 chessrun-upload-key.jks > chessrun-upload-key.b64.txt
          echo ""
          echo "Base64 keystore written to chessrun-upload-key.b64.txt"

      - name: Write credentials file
        run: |
          cat > keystore-credentials.txt << EOF
          ============================================================
          ChessRun Upload Keystore Credentials
          Generated: $(date -u)
          ============================================================

          GitHub Secret Name          Value
          --------------------------  ----------------------------------------
          ANDROID_KEYSTORE_BASE64     (see chessrun-upload-key.b64.txt artifact)
          ANDROID_KEYSTORE_PASSWORD   ${{ steps.creds.outputs.keystore_password }}
          ANDROID_KEY_ALIAS           ${{ steps.creds.outputs.key_alias }}
          ANDROID_KEY_PASSWORD        ${{ steps.creds.outputs.key_password }}

          ============================================================
          HOW TO ADD SECRETS TO GITHUB
          ============================================================
          1. Go to your repository on GitHub.
          2. Click Settings -> Secrets and variables -> Actions.
          3. Click "New repository secret" for each secret below:

             a) ANDROID_KEYSTORE_BASE64
                Value: paste the full contents of chessrun-upload-key.b64.txt

             b) ANDROID_KEYSTORE_PASSWORD
                Value: ${{ steps.creds.outputs.keystore_password }}

             c) ANDROID_KEY_ALIAS
                Value: ${{ steps.creds.outputs.key_alias }}

             d) ANDROID_KEY_PASSWORD
                Value: ${{ steps.creds.outputs.key_password }}

          4. Store the chessrun-upload-key.jks file somewhere safe
             (e.g., password manager). You will need it if you ever
             need to re-upload to Google Play after losing these secrets.

          ============================================================
          PLAY APP SIGNING NOTE
          ============================================================
          Enable Play App Signing in the Google Play Console:
            App -> Setup -> App integrity -> App signing

          Upload this key as the "upload key". Google will re-sign
          your app with their app signing key before distributing it.
          This means you can always reset the upload key via Play Console
          if you lose access.
          ============================================================
          EOF
          echo "Credentials file written."

      - name: Print setup instructions to log
        run: |
          echo "================================================================"
          echo " KEYSTORE GENERATION COMPLETE"
          echo "================================================================"
          echo ""
          echo " Download the following artifacts from this workflow run:"
          echo "   1. chessrun-keystore-files"
          echo "      - chessrun-upload-key.jks  (keep this safe!)"
          echo "      - chessrun-upload-key.b64.txt"
          echo "      - keystore-credentials.txt"
          echo ""
          echo " Then add the following GitHub repository secrets:"
          echo "   ANDROID_KEYSTORE_BASE64  = contents of chessrun-upload-key.b64.txt"
          echo "   ANDROID_KEYSTORE_PASSWORD = ${{ steps.creds.outputs.keystore_password }}"
          echo "   ANDROID_KEY_ALIAS         = ${{ steps.creds.outputs.key_alias }}"
          echo "   ANDROID_KEY_PASSWORD      = ${{ steps.creds.outputs.key_password }}"
          echo ""
          echo " Path: Settings -> Secrets and variables -> Actions -> New repository secret"
          echo "================================================================"

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chessrun-keystore-files
          path: |
            chessrun-upload-key.jks
            chessrun-upload-key.b64.txt
            keystore-credentials.txt
          retention-days: 1
